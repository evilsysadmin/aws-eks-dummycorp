apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alb-ingress-controller
  namespace: argocd
spec:
  project: default
  source:
    chart: alb-ingress-controller
    repoURL: https://aws.github.io/eks-charts
    targetRevision: 1.6.2
    helm:
      values: |
        clusterName: dummycorp-eks
        serviceAccount:
          create: true
          name: aws-ingress-controller
          annotations:
            eks.amazonaws.com/role-arn: 'arn:aws:iam::980921756231:role/alb_ingress_controller'
        region: eu-west-1
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true